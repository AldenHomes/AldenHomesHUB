<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alden Homes | Service Request</title>
<style>
  :root{
    --navy:#4B4F54;
    --navy-2:#33363a;
    --steel-line:#d4d2c8;
    --paper:#f5f4ef;
    --paper-2:#ffffff;
    --ink:#33363a;
    --ink-soft:#6b6f72;
    --rust:#A3AA83;
    --rust-2:#6B7355;
    --amber:#c98a2b;
    --danger:#b3452f;
    --shadow: 0 1px 2px rgba(30,32,34,.08), 0 4px 14px rgba(30,32,34,.06);
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .header{
    background:var(--paper-2); border-bottom:4px solid var(--rust);
    padding:22px clamp(16px,4vw,40px); text-align:center;
  }
  .header img{height:44px; display:block; margin:0 auto 10px;}
  .header h1{margin:0; font-size:19px; color:var(--navy);}
  .header p{margin:4px 0 0; font-size:13px; color:var(--ink-soft);}

  .wrap{max-width:560px; margin:0 auto; padding: 28px 18px 60px;}
  .card{background:var(--paper-2); border-radius:var(--radius); box-shadow:var(--shadow); padding:26px 22px;}

  .field{margin-bottom:18px;}
  .field label{display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-bottom:6px;}
  .field .req{color:var(--rust-2);}
  input[type=text], input[type=tel], input[type=email], textarea{
    width:100%; padding:11px 12px; border:1px solid var(--steel-line); border-radius:var(--radius);
    font-size:15px; color:var(--ink); background:#fff; font-family:inherit;
  }
  input:focus, textarea:focus{outline:2px solid var(--amber); outline-offset:0; border-color:var(--amber);}
  textarea{min-height:110px; resize:vertical;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){ .row2{grid-template-columns:1fr;} }

  .photo-input-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    border:2px dashed var(--steel-line); border-radius:var(--radius); padding:22px;
    color:var(--ink-soft); font-size:13.5px; font-weight:600; cursor:pointer; text-align:center;
  }
  .photo-input-btn:hover{border-color:var(--rust); color:var(--rust-2);}
  .photo-input-btn input{display:none;}
  .photo-thumbs{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;}
  .photo-thumb{position:relative; width:78px; height:78px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--steel-line);}
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-thumb .remove{
    position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%;
    background:rgba(30,32,34,.75); color:#fff; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:13px; line-height:1; padding:0;
  }
  .photo-note{font-size:11.5px; color:var(--ink-soft); margin-top:8px;}

  .btn-submit{
    width:100%; padding:14px; background:var(--navy); color:#fff; border:none; border-radius:var(--radius);
    font-size:15.5px; font-weight:700; cursor:pointer; margin-top:8px;
  }
  .btn-submit:hover{background:var(--navy-2);}
  .btn-submit:disabled{background:#9a9d9f; cursor:default;}

  .error-box{
    background:#fbeae4; border:1px solid #f0c3ae; color:#a8451a; font-size:13px;
    padding:11px 13px; border-radius:var(--radius); margin-bottom:16px; display:none; line-height:1.5;
  }
  .error-box.show{display:block;}

  .success-card{text-align:center; padding:20px 10px;}
  .success-icon{
    width:56px; height:56px; border-radius:50%; background:#eaf1ec; color:#3f7a4e;
    display:flex; align-items:center; justify-content:center; margin:0 auto 18px;
  }
  .success-card h2{margin:0 0 8px; font-size:19px; color:var(--navy);}
  .success-card p{margin:0; font-size:14px; color:var(--ink-soft); line-height:1.6;}

  footer{text-align:center; color:var(--ink-soft); font-size:11.5px; margin-top:24px;}
</style>
</head>

  <h1>Service Request</h1>
  <p>Tell us what's going on and we'll follow up with you.</p>
</div>

<div class="wrap">
  <div class="card" id="formCard">
    <div class="error-box" id="errorBox"></div>
    <form id="requestForm">
      <div class="field">
        <label for="f_name">Your Name <span class="req">*</span></label>
        <input type="text" id="f_name" required>
      </div>
      <div class="row2">
        <div class="field">
          <label for="f_phone">Phone <span class="req">*</span></label>
          <input type="tel" id="f_phone" required placeholder="717-555-0100">
        </div>
        <div class="field">
          <label for="f_email">Email</label>
          <input type="email" id="f_email">
        </div>
      </div>
      <div class="field">
        <label for="f_address">Address <span class="req">*</span></label>
        <input type="text" id="f_address" required placeholder="1020 Stanford Dr">
      </div>
      <div class="field">
        <label for="f_lot">Lot # <span style="text-transform:none; font-weight:400;">(if you know it)</span></label>
        <input type="text" id="f_lot">
      </div>
      <div class="field">
        <label for="f_description">What's going on? <span class="req">*</span></label>
        <textarea id="f_description" required placeholder="Describe the issue as best you can..."></textarea>
      </div>
      <div class="field">
        <label>Photos <span style="text-transform:none; font-weight:400;">(optional, up to 5)</span></label>
        <label class="photo-input-btn" id="photoBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>Tap to add photos</span>
          <input type="file" id="f_photos" accept="image/*" multiple>
        </label>
        <div class="photo-thumbs" id="photoThumbs"></div>
        <div class="photo-note" id="photoNote"></div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Submit Request</button>
    </form>
  </div>

  <div class="card success-card" id="successCard" style="display:none;">
    <div class="success-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h2>Request received</h2>
    <p>Thanks — we've got your request and will be in touch soon.</p>
  </div>

  <footer>Alden Homes</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgANXWyuPfVq9OK_v-a-8rGgesCB-wzz4",
  authDomain: "alden-homes-hub.firebaseapp.com",
  projectId: "alden-homes-hub",
  storageBucket: "alden-homes-hub.firebasestorage.app",
  messagingSenderId: "70316619103",
  appId: "1:70316619103:web:8843743409eca22faab2ea",
  measurementId: "G-RT6T7EEBL0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const MAX_PHOTOS = 5;
let selectedFiles = [];

function showError(msg){
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}
function clearError(){
  document.getElementById('errorBox').classList.remove('show');
}

// Sign the customer in anonymously, invisibly — no login screen for them.
firebase.auth().signInAnonymously().catch(err=>{
  console.error('Anonymous sign-in failed', err);
  showError("We're having trouble connecting right now. Please call our office directly to report your issue.");
  document.getElementById('submitBtn').disabled = true;
});

document.getElementById('f_photos').addEventListener('change', e=>{
  const incoming = Array.from(e.target.files);
  const room = MAX_PHOTOS - selectedFiles.length;
  if(incoming.length > room){
    document.getElementById('photoNote').textContent = `Only ${MAX_PHOTOS} photos allowed — added the first ${Math.max(room,0)}.`;
  } else {
    document.getElementById('photoNote').textContent = '';
  }
  selectedFiles = selectedFiles.concat(incoming.slice(0, Math.max(room,0)));
  e.target.value = '';
  renderThumbs();
});

function renderThumbs(){
  const container = document.getElementById('photoThumbs');
  container.innerHTML = '';
  selectedFiles.forEach((file, idx)=>{
    const url = URL.createObjectURL(file);
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${url}"><button type="button" class="remove" data-idx="${idx}">&times;</button>`;
    container.appendChild(div);
  });
  document.getElementById('photoBtn').style.display = selectedFiles.length >= MAX_PHOTOS ? 'none' : 'flex';
}
document.getElementById('photoThumbs').addEventListener('click', e=>{
  const btn = e.target.closest('.remove');
  if(!btn) return;
  selectedFiles.splice(Number(btn.dataset.idx), 1);
  renderThumbs();
});

document.getElementById('requestForm').addEventListener('submit', async e=>{
  e.preventDefault();
  clearError();

  const name = document.getElementById('f_name').value.trim();
  const phone = document.getElementById('f_phone').value.trim();
  const email = document.getElementById('f_email').value.trim();
  const address = document.getElementById('f_address').value.trim();
  const lot = document.getElementById('f_lot').value.trim();
  const description = document.getElementById('f_description').value.trim();

  if(!name || !phone || !address || !description){
    showError('Please fill in your name, phone, address, and a description before submitting.');
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting…';

  try{
    const requestId = db.collection('service-requests').doc().id;

    let photoUrls = [];
    if(selectedFiles.length){
      submitBtn.textContent = 'Uploading photos…';
      photoUrls = await Promise.all(selectedFiles.map((file, i)=>{
        const ref = storage.ref().child(`service-photos/${requestId}/${i}-${file.name}`);
        return ref.put(file).then(()=>ref.getDownloadURL());
      }));
    }

    submitBtn.textContent = 'Saving…';
    await db.collection('service-requests').doc(requestId).set({
      name, phone, email, address, lot, description,
      photoUrls,
      status: 'new',
      submittedAt: new Date().toISOString(),
    });

    document.getElementById('formCard').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';
  } catch(err){
    console.error(err);
    showError("Something went wrong submitting your request. Please try again, or call our office directly.");
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Request';
  }
});
</script>
</body>
</html>
